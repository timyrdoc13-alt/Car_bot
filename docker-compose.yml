# Бот по умолчанию. Монитор: --profile monitor. Redis + воркер пайплайна: --profile pipeline
services:
  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_PATH: /app/data/bot.db
    volumes:
      - bot_data:/app/data
    restart: unless-stopped

  redis:
    profiles: [pipeline]
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  pipeline-worker:
    profiles: [pipeline]
    build: .
    env_file: .env
    environment:
      DATABASE_PATH: /app/data/bot.db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - bot_data:/app/data
    command: ["car-pipeline-worker"]
    depends_on:
      - redis
    restart: unless-stopped

  monitor:
    profiles: [monitor]
    build: .
    env_file: .env
    command:
      - uvicorn
      - car_channel_bot.monitoring.app:app
      - --host
      - "0.0.0.0"
      - --port
      - "8765"
    ports:
      # Только интерфейс loopback на хосте — снаружи открывайте осознанно (см. DEPLOY.md)
      - "127.0.0.1:8765:8765"
    restart: unless-stopped

volumes:
  bot_data:
  redis_data:
